name: Setup
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.0'

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: Install pnpm
      run: |
        npm install -g pnpm
        corepack enable pnpm
      shell: bash

    - name: Install Wails v3 CLI
      run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      shell: bash

    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      shell: bash